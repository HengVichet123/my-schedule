<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="My Schedule">
  <meta name="theme-color" content="#1a1a2e">
  <link rel="manifest" href="manifest.json">
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <link rel="apple-touch-icon" href="icon.png">
  <title>My Schedule</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f5f5; color: #222; height: 100dvh; display: flex; flex-direction: column; }

    header {
      background: #1a1a2e; color: white;
      padding: 12px 16px;
      padding-top: max(12px, env(safe-area-inset-top));
      display: flex; align-items: center; gap: 10px; flex-shrink: 0;
    }
    header h1 { font-size: 1rem; font-weight: 600; flex: 1; }
    .week-nav { display: flex; align-items: center; gap: 6px; }
    .week-nav button { background: rgba(255,255,255,0.15); border: none; color: white; padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 0.9rem; }
    .week-label { font-size: 0.75rem; min-width: 130px; text-align: center; }
    .week-nav .today-btn { font-size: 0.7rem; padding: 4px 8px; }

    .toolbar { background: #1a1a2e; padding: 0 16px 10px; display: flex; gap: 8px; flex-wrap: wrap; flex-shrink: 0; }
    .toolbar button { padding: 6px 12px; border: none; border-radius: 6px; cursor: pointer; font-size: 0.78rem; font-weight: 500; background: rgba(255,255,255,0.15); color: white; }
    .toolbar button:hover { background: rgba(255,255,255,0.25); }

    .calendar-wrap { flex: 1; overflow: auto; }
    .calendar {
      display: grid;
      grid-template-columns: 44px repeat(14, 1fr);
      min-width: 700px;
    }

    .cal-corner { background: white; border-bottom: 1px solid #e0e0e0; border-right: 1px solid #e0e0e0; position: sticky; top: 0; z-index: 11; }
    .day-header {
      background: white; border-bottom: 2px solid #e0e0e0; border-right: 1px solid #eee;
      padding: 6px 2px; text-align: center; font-size: 0.7rem;
      position: sticky; top: 0; z-index: 10;
    }
    .day-header .day-name { color: #888; font-weight: 500; text-transform: uppercase; letter-spacing: 0.3px; }
    .day-header .day-num { font-size: 1.1rem; font-weight: 300; color: #333; line-height: 1.3; }
    .day-header.today .day-num { background: #1a1a2e; color: white; border-radius: 50%; width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; margin: 2px auto 0; font-size: 0.85rem; font-weight: 600; }

    .time-col { border-right: 1px solid #e0e0e0; background: white; }
    .time-slot { padding: 2px 4px; font-size: 0.62rem; color: #999; text-align: right; border-bottom: 1px solid #f0f0f0; position: relative; top: -8px; }

    .day-col { position: relative; border-right: 1px solid #eee; background: white; }
    .hour-row { border-bottom: 1px solid #f0f0f0; }

    .shift-block {
      position: absolute; left: 1px; right: 1px;
      border-radius: 5px; padding: 2px 4px;
      font-size: 0.68rem; cursor: pointer;
      overflow: hidden; z-index: 5;
    }
    .shift-block.type-shift { background: #4a6cf7; color: white; border-left: 3px solid #2a4cd7; }
    .shift-block.type-class { background: #27ae60; color: white; border-left: 3px solid #1e8449; }
    .shift-block .shift-time { font-size: 0.62rem; opacity: 0.85; }
    .shift-block .shift-label { font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* Modal */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; align-items: flex-end; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal { background: white; border-radius: 16px 16px 0 0; padding: 20px 20px calc(20px + env(safe-area-inset-bottom)); width: 100%; max-width: 500px; box-shadow: 0 -4px 24px rgba(0,0,0,0.15); max-height: 85dvh; overflow-y: auto; }
    .modal-handle { width: 36px; height: 4px; background: #ddd; border-radius: 2px; margin: 0 auto 16px; }
    .modal h2 { margin-bottom: 14px; font-size: 1rem; }
    .form-group { margin-bottom: 10px; }
    label { display: block; font-size: 0.8rem; color: #555; margin-bottom: 3px; }
    input, select { width: 100%; padding: 8px 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 0.9rem; }
    .form-row { display: flex; gap: 8px; }
    .form-row .form-group { flex: 1; }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 14px; }
    .btn-outline { background: white; border: 1px solid #ddd; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 0.85rem; }
    .btn-save { background: #1a1a2e; color: white; padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer; font-size: 0.85rem; }
    .btn-danger { background: #fee; color: #e74c3c; border: 1px solid #fcc; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 0.85rem; }

    /* Upload */
    .upload-area { border: 2px dashed #ccc; border-radius: 10px; padding: 24px; text-align: center; cursor: pointer; margin-bottom: 10px; }
    .upload-area p { color: #888; font-size: 0.85rem; margin-top: 6px; }
    .extracted-item { display: flex; align-items: center; gap: 8px; padding: 5px 8px; background: #f8f8f8; border-radius: 6px; margin-bottom: 4px; font-size: 0.78rem; }
    .upload-area { padding: 14px; }
    .upload-area p { font-size: 0.8rem; }
  </style>
</head>
<body>

<header>
  <h1>My Schedule</h1>
  <div class="week-nav">
    <button onclick="changeWeek(-1)">&#8592;</button>
    <span class="week-label" id="week-label"></span>
    <button onclick="changeWeek(1)">&#8594;</button>
    <button class="today-btn" onclick="goToday()">Today</button>
  </div>
</header>

<div class="toolbar">
  <button onclick="openAddModal()">+ Add</button>
  <button onclick="openUploadModal()">📷 Shift Photo</button>
  <button onclick="syncFromGitHub('school')">☁️ Sync School</button>
  <button onclick="syncFromGitHub('shifts')">☁️ Sync Shifts</button>
</div>

<div class="calendar-wrap">
  <div class="calendar" id="calendar-wrap"></div>
</div>

<!-- Add/Edit Modal -->
<div class="modal-overlay" id="add-modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2 id="modal-title">Add Entry</h2>
    <div class="form-group"><label>Date</label><input type="date" id="input-date"></div>
    <div class="form-row">
      <div class="form-group"><label>Start</label><input type="time" id="input-start"></div>
      <div class="form-group"><label>End</label><input type="time" id="input-end"></div>
    </div>
    <div class="form-group"><label>Label</label><input type="text" id="input-label" placeholder="Class name, shift location..."></div>
    <div class="form-group">
      <label>Type</label>
      <select id="input-type">
        <option value="shift">Shift (blue)</option>
        <option value="class">Class (green)</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn-danger" id="delete-btn" style="display:none" onclick="deleteCurrentEntry()">Delete</button>
      <button class="btn-outline" onclick="closeModal('add-modal')">Cancel</button>
      <button class="btn-save" onclick="saveEntry()">Save</button>
    </div>
  </div>
</div>

<!-- Upload Modal -->
<div class="modal-overlay" id="upload-modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2>Read Shift Screenshot</h2>
    <div class="upload-area" onclick="document.getElementById('file-input').click()">
      <div style="font-size:2rem">📷</div>
      <p>Tap to upload screenshot of your shift schedule</p>
    </div>
    <input type="file" id="file-input" accept="image/*" style="display:none" onchange="handleUpload(event)">
    <div id="extracted-results"></div>
    <div class="modal-actions">
      <button class="btn-outline" onclick="closeModal('upload-modal')">Close</button>
    </div>
  </div>
</div>

<!-- Import School Modal -->
<div class="modal-overlay" id="school-modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2>Import School Data</h2>
    <p style="font-size:0.85rem;color:#555;margin-bottom:14px">Paste the JSON data exported from your computer's fetch script.</p>
    <textarea id="school-json" style="width:100%;height:120px;border:1px solid #ddd;border-radius:8px;padding:8px;font-size:0.78rem;font-family:monospace" placeholder='[{"id":"...","date":"..."}]'></textarea>
    <div class="modal-actions">
      <button class="btn-outline" onclick="closeModal('school-modal')">Cancel</button>
      <button class="btn-save" onclick="doImportSchool()">Import</button>
    </div>
  </div>
</div>

<script>
const START_HOUR = 6, END_HOUR = 24;
const HOURS = END_HOUR - START_HOUR;
function getPxPerHour() {
  const available = window.innerHeight - 110; // minus header+toolbar
  return Math.floor(available / HOURS);
}
const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
let entries = [], editingId = null, weekOffset = 0;

// Storage
function load() { try { entries = JSON.parse(localStorage.getItem('schedule') || '[]'); } catch { entries = []; } }
function save() { localStorage.setItem('schedule', JSON.stringify(entries)); }
load();

function toDateStr(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function getWeekDates(offset) {
  const today = new Date();
  const day = today.getDay();
  const monday = new Date(today);
  monday.setDate(today.getDate() - (day === 0 ? 6 : day - 1) + offset * 7);
  return Array.from({length: 7}, (_, i) => { const d = new Date(monday); d.setDate(monday.getDate() + i); return d; });
}

function changeWeek(dir) { weekOffset += dir * 2; render(); }
function goToday() { weekOffset = 0; render(); }

function render() {
  const today = toDateStr(new Date());
  const w1 = getWeekDates(weekOffset), w2 = getWeekDates(weekOffset + 1);
  const allDates = [...w1, ...w2];
  const fmt = d => d.toLocaleDateString('en', {month:'short', day:'numeric'});
  document.getElementById('week-label').textContent = `${fmt(allDates[0])} – ${fmt(allDates[13])}`;

  const wrap = document.getElementById('calendar-wrap');
  wrap.innerHTML = '';

  // Corner
  const corner = document.createElement('div'); corner.className = 'cal-corner'; wrap.appendChild(corner);

  // Day headers
  allDates.forEach(d => {
    const el = document.createElement('div');
    el.className = 'day-header' + (toDateStr(d) === today ? ' today' : '');
    el.innerHTML = `<div class="day-name">${DAYS[d.getDay()]}</div><div class="day-num">${d.getDate()}</div>`;
    wrap.appendChild(el);
  });

  // Time col
  const PPH2 = getPxPerHour();
  const timeCol = document.createElement('div'); timeCol.className = 'time-col';
  for (let h = START_HOUR; h < END_HOUR; h++) {
    const s = document.createElement('div'); s.className = 'time-slot';
    s.style.height = `${PPH2}px`;
    s.textContent = `${h}:00`; timeCol.appendChild(s);
  }
  wrap.appendChild(timeCol);

  // Day columns
  const PPH = getPxPerHour();
  allDates.forEach(d => {
    const dateStr = toDateStr(d);
    const col = document.createElement('div'); col.className = 'day-col'; col.style.height = `${HOURS * PPH}px`;
    for (let h = 0; h < HOURS; h++) { const r = document.createElement('div'); r.className = 'hour-row'; r.style.height = `${PPH}px`; col.appendChild(r); }
    entries.filter(e => e.date === dateStr).forEach(e => {
      const [sh, sm] = e.start.split(':').map(Number);
      const [eh, em] = e.end.split(':').map(Number);
      const startMin = (sh - START_HOUR) * 60 + sm;
      let endMin = (eh === 0 ? (24 - START_HOUR) * 60 : (eh - START_HOUR) * 60 + em);
      const top = startMin * (PPH / 60);
      const height = Math.max((endMin - startMin) * (PPH / 60), 16);
      const block = document.createElement('div');
      block.className = `shift-block type-${e.type || 'shift'}`;
      block.style.top = `${top}px`; block.style.height = `${height}px`;
      block.innerHTML = `<div class="shift-time">${e.start}–${e.end}</div><div class="shift-label">${e.label||''}</div>`;
      block.onclick = () => editEntry(e.id);
      col.appendChild(block);
    });
    wrap.appendChild(col);
  });
}

function openAddModal(dateStr) {
  editingId = null;
  document.getElementById('modal-title').textContent = 'Add Entry';
  document.getElementById('delete-btn').style.display = 'none';
  document.getElementById('input-date').value = dateStr || toDateStr(new Date());
  document.getElementById('input-start').value = '';
  document.getElementById('input-end').value = '';
  document.getElementById('input-label').value = '';
  document.getElementById('input-type').value = 'shift';
  document.getElementById('add-modal').classList.add('open');
}

function editEntry(id) {
  const e = entries.find(x => x.id === id); if (!e) return;
  editingId = id;
  document.getElementById('modal-title').textContent = 'Edit Entry';
  document.getElementById('delete-btn').style.display = 'block';
  document.getElementById('input-date').value = e.date;
  document.getElementById('input-start').value = e.start;
  document.getElementById('input-end').value = e.end;
  document.getElementById('input-label').value = e.label || '';
  document.getElementById('input-type').value = e.type || 'shift';
  document.getElementById('add-modal').classList.add('open');
}

function saveEntry() {
  const data = {
    date: document.getElementById('input-date').value,
    start: document.getElementById('input-start').value,
    end: document.getElementById('input-end').value,
    label: document.getElementById('input-label').value,
    type: document.getElementById('input-type').value
  };
  if (!data.date || !data.start || !data.end) return alert('Fill all fields.');
  if (editingId) {
    const i = entries.findIndex(x => x.id === editingId);
    if (i >= 0) entries[i] = { ...entries[i], ...data };
  } else {
    data.id = Date.now().toString();
    entries.push(data);
  }
  save(); closeModal('add-modal'); render();
}

function deleteCurrentEntry() {
  if (!confirm('Delete?')) return;
  entries = entries.filter(x => x.id !== editingId);
  save(); closeModal('add-modal'); render();
}

function closeModal(id) { document.getElementById(id).classList.remove('open'); }

function openUploadModal() {
  document.getElementById('extracted-results').innerHTML = '';
  document.getElementById('file-input').value = '';
  document.getElementById('upload-modal').classList.add('open');
}

async function handleUpload(e) {
  const file = e.target.files[0]; if (!file) return;
  const container = document.getElementById('extracted-results');
  container.innerHTML = '<p style="color:#888;font-size:0.85rem">Reading... please wait ⏳</p>';
  try {
    const { data: { text } } = await Tesseract.recognize(file, 'jpn+eng', {
      logger: m => { if (m.status === 'recognizing text') container.innerHTML = `<p style="color:#888;font-size:0.85rem">Reading... ${Math.round(m.progress*100)}%</p>`; }
    });
    const shifts = parseShiftsFromText(text);
    renderExtracted({ shifts, raw_text: text });
  } catch {
    container.innerHTML = '<p style="color:#e74c3c;font-size:0.85rem">Failed to read image.</p>';
  }
}

function parseShiftsFromText(text) {
  const shifts = [];
  const year = new Date().getFullYear();
  const lines = text.split('\n');
  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];
    const timeMatch = line.match(/(\d{2}):(\d{2})\s*[~〜>]\s*(\d{2}):(\d{2})/);
    if (!timeMatch) continue;
    const [, sh, sm, eh, em] = timeMatch;
    let dateMatch = line.match(/(\d{1,2})[\/](\d{1,2})/);
    if (!dateMatch) dateMatch = line.match(/(\d)7(\d{2})[(（]/);
    if (!dateMatch) continue;
    const [, month, day] = dateMatch;
    const location = (lines[i+1] || '').trim().replace(/\s+/g, '');
    shifts.push({
      id: `${month}${day}${sh}${eh}${sm}`,
      date: `${year}-${month.padStart(2,'0')}-${day.padStart(2,'0')}`,
      start: `${sh}:${sm}`,
      end: `${eh}:${em}`,
      label: location && !/\d{2}:\d{2}/.test(location) ? location : '出勤',
      type: 'shift'
    });
  }
  return shifts;
}

function renderExtracted(data) {
  const container = document.getElementById('extracted-results');
  if (!data.shifts?.length) { container.innerHTML = `<p style="color:#e74c3c;font-size:0.85rem">No shifts detected.</p>`; return; }
  window._extracted = data.shifts;
  container.innerHTML = `
    <p style="font-size:0.82rem;color:#555;margin-bottom:8px">Found ${data.shifts.length} shifts:</p>
    ${data.shifts.map((s,i) => `<div class="extracted-item"><input type="checkbox" id="chk-${i}" checked><span>${s.date} ${s.start}–${s.end} <span style="color:#999">${s.label}</span></span></div>`).join('')}
    <button class="btn-save" style="margin-top:10px;width:100%;padding:8px" onclick="addExtracted()">Add All</button>`;
}

function addExtracted() {
  const shifts = window._extracted || [];
  const checkboxes = document.querySelectorAll('[id^="chk-"]');
  shifts.filter((_,i) => checkboxes[i]?.checked).forEach(s => {
    s.id = Date.now().toString() + Math.random();
    s.type = 'shift';
    entries.push(s);
  });
  save(); render(); closeModal('upload-modal');
}

async function syncFromGitHub(type) {
  const file = type === 'school' ? 'school_shifts.json' : 'shifts.json';
  const label = type === 'school' ? 'class' : 'shift';
  try {
    const res = await fetch(`https://HengVichet123.github.io/my-schedule/${file}?t=` + Date.now());
    if (!res.ok) throw new Error('Not found');
    const data = await res.json();
    const existing = new Set(entries.map(e => e.id));
    let added = 0;
    data.forEach(s => { if (!existing.has(s.id)) { entries.push(s); added++; } });
    save(); render();
    alert(`Synced! Added ${added} ${label} entries.`);
  } catch {
    alert('Sync failed. Run sync.sh on your computer first.');
  }
}

document.querySelectorAll('.modal-overlay').forEach(el => {
  el.addEventListener('click', e => { if (e.target === el) el.classList.remove('open'); });
});

if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');

window.addEventListener('resize', render);
render();
</script>
</body>
</html>
